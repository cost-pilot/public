apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: costpilot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # OCI Helm chart from GHCR
    chart: cost-pilot-agent
    repoURL: ghcr.io/cost-pilot/helm
    targetRevision: "0.1.0" # pin to a specific release
    helm:
      releaseName: costpilot
      values: |
        backend:
          ingesterEndpoint: eu   # or us
        secrets:
          agent:
            clusterApiKeySecretName: cp-agent-secret
  destination:
    server: https://kubernetes.default.svc
    namespace: costpilot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
